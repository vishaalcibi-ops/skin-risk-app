<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Skin_Risk</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body class="auth-page-bg">
    <div class="auth-container-alt">
        <div class="auth-card-alt animate-slide-up">
            <h1 class="auth-title-alt">Login Account <small style="font-size: 0.6rem; opacity: 0.5;">v1.2</small></h1>
            <p style="text-align: center; color: #666; margin-bottom: 20px; font-size: 0.9rem;">
                Enter your Skin_Risk email and password.
            </p>

            {% with messages = get_flashed_messages() %}
            {% if messages %}
            <div class="flashes-auth">
                {% for message in messages %}
                <p class="flash-msg-auth" style="color: #ff4b2b; margin-bottom: 20px; font-size: 0.9rem;"><i
                        class="fa-solid fa-triangle-exclamation"></i> {{ message }}</p>
                {% endfor %}
            </div>
            {% endif %}
            {% endwith %}

            <form action="/login" method="POST" class="auth-form-alt">
                <div class="auth-icon-input-group">
                    <i class="fa-solid fa-envelope auth-icon"></i>
                    <input type="email" id="email" name="email" class="auth-input-alt" placeholder="Email" required>
                </div>

                <div class="auth-icon-input-group">
                    <i class="fa-solid fa-lock auth-icon"></i>
                    <input type="password" id="password" name="password" class="auth-input-alt" placeholder="Password"
                        required>
                </div>

                <button type="submit" class="auth-submit-alt">Login</button>
            </form>

            <div class="google-auth-separator"
                style="margin: 20px 0; text-align: center; color: #888; position: relative;">
                <span style="background: white; padding: 0 10px; position: relative; z-index: 1;">OR</span>
                <hr style="position: absolute; top: 50%; left: 0; right: 0; border: none; border-top: 1px solid #eee;">
            </div>

            <a href="/login/google" class="btn-google"
                style="display: flex; align-items: center; justify-content: center; width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; background: white; color: #555; text-decoration: none; font-weight: 600; transition: all 0.3s ease;">
                <svg width="18" height="18" viewBox="0 0 18 18" style="margin-right: 10px;">
                    <path
                        d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z"
                        fill="#4285F4" />
                    <path
                        d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 009 18z"
                        fill="#34A853" />
                    <path
                        d="M3.964 10.712c-.18-.54-.282-1.117-.282-1.712s.102-1.173.282-1.712V4.956H.957a8.996 8.996 0 000 8.088l3.007-2.332z"
                        fill="#FBBC05" />
                    <path
                        d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0 5.482 0 2.443 2.043.957 4.956L3.964 7.288c.708-2.127 2.692-3.708 5.036-3.708z"
                        fill="#EA4335" />
                </svg>
                Sign in with Google
            </a>

            <div class="auth-link-alt">
                Don't have an account? <a href="/signup">Sign Up</a>
            </div>
        </div>
    </div>
</body>

</html>
