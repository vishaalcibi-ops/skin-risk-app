<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Consultation | Skin_Risk</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body class="result-page">
    <div class="video-workspace">
        <!-- Main Video Area -->
        <div class="dr-video-container">
            <img src="https://images.unsplash.com/photo-1559839734-2b71ea197ec2?auto=format&fit=crop&w=1000&q=80"
                alt="Doctor Video" class="dr-video-mock">
            <div class="video-overlay">
                <span class="dr-name">Dr. Sarah Smith (Dermatologist)</span>
                <span class="call-duration" id="duration">00:00</span>
            </div>
        </div>

        <!-- Self Video (PIP) -->
        <div class="self-video">
            <div class="self-video-placeholder">
                <i class="fa-solid fa-user"></i>
                <span>Your Camera</span>
            </div>
        </div>

        <!-- Controls -->
        <div class="video-controls">
            <button class="control-btn"><i class="fa-solid fa-microphone"></i></button>
            <button class="control-btn"><i class="fa-solid fa-video"></i></button>
            <button class="control-btn end-call" onclick="location.href='/appointments'"><i
                    class="fa-solid fa-phone-slash"></i></button>
            <button class="control-btn"><i class="fa-solid fa-share-nodes"></i></button>
            <button class="control-btn"><i class="fa-solid fa-ellipsis-vertical"></i></button>
        </div>
    </div>

    <style>
        body {
            margin: 0;
            background: #0f172a;
            overflow: hidden;
            font-family: 'Outfit', sans-serif;
        }

        .video-workspace {
            height: 100vh;
            position: relative;
        }

        .dr-video-container {
            width: 100%;
            height: 100%;
            position: relative;
        }

        .dr-video-mock {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .video-overlay {
            position: absolute;
            top: 2rem;
            left: 2rem;
            right: 2rem;
            display: flex;
            justify-content: space-between;
            color: white;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
        }

        .dr-name {
            background: rgba(0, 0, 0, 0.5);
            padding: 8px 16px;
            border-radius: 8px;
            font-weight: 500;
        }

        .call-duration {
            background: rgba(244, 63, 94, 0.8);
            padding: 8px 16px;
            border-radius: 8px;
        }

        .self-video {
            position: absolute;
            bottom: 8rem;
            right: 2rem;
            width: 240px;
            height: 150px;
            background: #1e293b;
            border-radius: 12px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
        }

        .self-video-placeholder {
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #64748b;
            gap: 10px;
        }

        .self-video-placeholder i {
            font-size: 2rem;
        }

        .video-controls {
            position: absolute;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 1.5rem;
            background: rgba(15, 23, 42, 0.8);
            padding: 1.5rem 2.5rem;
            border-radius: 50px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .control-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: none;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .control-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }

        .control-btn.end-call {
            background: #f43f5e;
        }

        .control-btn.end-call:hover {
            background: #e11d48;
        }
    </style>

    <script>
        let seconds = 0;
        setInterval(() => {
            seconds++;
            const mins = Math.floor(seconds / 60);
            const secs = seconds % 60;
            document.getElementById('duration').innerText =
                `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        }, 1000);
    </script>
</body>

</html>
