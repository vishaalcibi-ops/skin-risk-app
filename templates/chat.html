<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Chat | Skin_Risk</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body class="result-page">
    <div class="app-container">
        <header class="navbar">
            <div class="logo">
                <i class="fa-solid fa-microscope text-gradient"></i>
                <a href="/dashboard" style="color: inherit;">Skin_<span class="text-gradient">Risk</span></a>
            </div>
            <a href="/appointments" class="back-link"><i class="fa-solid fa-arrow-left"></i> End Session</a>
        </header>

        <main class="chat-container glass-panel animate-slide-up">
            <div class="chat-header">
                <div class="dr-profile">
                    <img src="https://ui-avatars.com/api/?name=Dr+Sarah+Smith&background=6366f1&color=fff" alt="Doctor">
                    <div>
                        <h4>Dr. Sarah Smith</h4>
                        <span class="online-indicator"><i class="fa-solid fa-circle"></i> Online</span>
                    </div>
                </div>
                <div class="chat-actions">
                    <i class="fa-solid fa-video"></i>
                    <i class="fa-solid fa-phone"></i>
                </div>
            </div>

            <div class="chat-messages" id="chatMessages">
                {% for msg in messages %}
                <div class="msg {{ msg.sender.lower() }} animate-fade-in">{{ msg.content }}</div>
                {% endfor %}
            </div>

            <div class="chat-input-area">
                <input type="text" id="userInput" placeholder="Type your message..." autocomplete="off">
                <button id="sendBtn"><i class="fa-solid fa-paper-plane"></i></button>
            </div>
        </main>
    </div>

    <style>
        .chat-container {
            height: 80vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            padding: 0;
            margin-top: 2rem;
        }

        .chat-header {
            padding: 1.5rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(15, 23, 42, 0.4);
        }

        .dr-profile {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        .dr-profile img {
            width: 45px;
            height: 45px;
            border-radius: 50%;
        }

        .online-indicator {
            font-size: 0.75rem;
            color: #4ade80;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .chat-actions {
            display: flex;
            gap: 1.5rem;
            color: #94a3b8;
            cursor: pointer;
        }

        .chat-messages {
            flex-grow: 1;
            overflow-y: auto;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .msg {
            max-width: 70%;
            padding: 12px 18px;
            border-radius: 18px;
            font-size: 0.95rem;
            line-height: 1.4;
        }

        .msg.doctor {
            background: rgba(30, 41, 59, 0.8);
            align-self: flex-start;
            border-bottom-left-radius: 4px;
            color: #e2e8f0;
        }

        .msg.user {
            background: var(--primary);
            align-self: flex-end;
            border-bottom-right-radius: 4px;
            color: white;
        }

        .msg.system {
            align-self: center;
            background: transparent;
            color: #64748b;
            font-size: 0.8rem;
            font-style: italic;
        }

        .chat-input-area {
            padding: 1.5rem;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            gap: 1rem;
            background: rgba(15, 23, 42, 0.4);
        }

        .chat-input-area input {
            flex-grow: 1;
            background: rgba(30, 41, 59, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            padding: 12px 20px;
            color: white;
        }

        #sendBtn {
            background: var(--primary);
            color: white;
            border: none;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            cursor: pointer;
            transition: transform 0.2s;
        }

        #sendBtn:hover {
            transform: scale(1.1);
        }
    </style>

    <script>
        const input = document.getElementById('userInput');
        const btn = document.getElementById('sendBtn');
        const container = document.getElementById('chatMessages');

        function send() {
            const val = input.value;
            if (!val) return;

            // Optimistically add user message to UI
            const userMsg = document.createElement('div');
            userMsg.className = 'msg user animate-fade-in';
            userMsg.textContent = val;
            container.appendChild(userMsg);

            input.value = '';
            container.scrollTop = container.scrollHeight;

            // Send to backend
            const formData = new FormData();
            formData.append('message', val);

            fetch('/chat/send', {
                method: 'POST',
                body: formData
            })
                .then(response => response.json())
                .then(data => {
                    if (data.status === 'success') {
                        // Add doctor response to UI
                        const drMsg = document.createElement('div');
                        drMsg.className = 'msg doctor animate-fade-in';
                        drMsg.textContent = data.doctor_message;
                        container.appendChild(drMsg);
                        container.scrollTop = container.scrollHeight;
                    } else {
                        console.error('Error sending message:', data.message);
                    }
                })
                .catch(error => {
                    console.error('Fetch error:', error);
                });
        }

        btn.addEventListener('click', send);
        input.addEventListener('keypress', (e) => { if (e.key === 'Enter') send(); });
    </script>
</body>

</html>
